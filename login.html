<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Aqua-Sprinkle</title>

<link rel="stylesheet" href="style.css">

<style>

.login-page{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,70,140,0.75),rgba(0,70,140,0.75)),
    url("hero.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-card{
    background:white;
    width:100%;
    max-width:450px;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-card img{
    display:block;
    margin:auto;
    height:80px;
    margin-bottom:20px;
}

.login-card h2{
    text-align:center;
    margin-bottom:30px;
    color:#003366;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

.login-button{
    width:100%;
    background:#0077cc;
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.login-button:hover{
    background:#005fa3;
}

.extra-links{
    text-align:center;
    margin-top:20px;
}

.extra-links a{
    color:#0077cc;
    text-decoration:none;
}

.extra-links p{
    margin-top:10px;
}

/* MOBILE FIX */
@media(max-width:900px){
    .login-card{
        padding:30px 20px;
    }
}

</style>

</head>

<body>

<!-- NAVBAR (UNIFIED ACROSS SITE) -->
<nav class="navbar">

    <div class="logo">
        <img src="images/logo.png" alt="Aqua-Sprinkle Logo">
    </div>

    <!-- MOBILE MENU BUTTON -->
    <div class="menu-toggle" id="menu-toggle">
        ☰
    </div>

    <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a class="login-btn active" href="login.html">Login</a></li>
    </ul>

</nav>

<!-- LOGIN SECTION -->
<div class="login-page">

    <div class="login-card">

        <img src="images/logo.png" alt="Aqua-Sprinkle">

        <h2>Customer Login</h2>

        <form>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>

            <button type="submit" class="login-button">
                Login
            </button>

        </form>

        <div class="extra-links">

            <a href="#">Forgot Password?</a>

            <p>
                Don't have an account?
                <a href="#">Register</a>
            </p>

        </div>

    </div>

</div>

<!-- MOBILE MENU SCRIPT -->
<script>
const menuToggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

menuToggle.addEventListener("click", () => {
    navLinks.classList.toggle("show");
});
</script>

</body>
</html>
